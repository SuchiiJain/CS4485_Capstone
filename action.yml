name: "Docrot Detector"
description: "Detect documentation rot by analyzing semantic code changes at the AST level."
branding:
  icon: "alert-triangle"
  color: "yellow"

inputs:
  repo_path:
    description: "Path to the repository root to scan (default: workspace root)."
    required: false
    default: "."
  create_issue:
    description: "Create or update a GitHub issue when alerts are found (true/false)."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Docrot Detector
      shell: bash
      run: |
        pip install --quiet requests psycopg2-binary python-dotenv

    - name: Run Docrot scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
        INPUT_REPO_PATH: ${{ inputs.repo_path }}
        INPUT_CREATE_ISSUE: ${{ inputs.create_issue }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python "${{ github.action_path }}/action_entrypoint.py"

    - name: Commit fingerprint baseline
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        cd "${{ inputs.repo_path }}"
        if [ -f .docrot-fingerprints.json ]; then
          git config user.name "Docrot Detector"
          git config user.email "docrot-bot@users.noreply.github.com"
          git add .docrot-fingerprints.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update docrot fingerprint baseline"
            git push
          fi
        fi
